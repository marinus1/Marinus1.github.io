<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Security Radar Intelligence</title>
    <!-- Tailwind CSS for high-end styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Analytics 4 Placeholder -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TRACKING_ID"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-TRACKING_ID'); // Replace with your actual GA4 ID later
    </script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans">

    <!-- Header Banner -->
    <header class="border-b border-slate-800 bg-slate-950 p-6 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold tracking-wider text-amber-500">⚡ SECURITY RADAR 24/7</h1>
                <p class="text-sm text-slate-400">Autonomous Security, Drone & Surveillance Intelligence Engine</p>
            </div>
            <!-- Subscription Box -->
            <div class="flex gap-2">
                <input type="email" id="sub-email" placeholder="Enter email for live alerts" class="px-4 py-2 bg-slate-800 border border-slate-700 rounded text-sm focus:outline-none focus:border-amber-500 text-white">
                <button onclick="subscribeUser()" class="bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold px-4 py-2 rounded text-sm transition-all">Subscribe Free</button>
            </div>
        </div>
    </header>

    <!-- Monetized Ad Space / Premium Sponsor Slot -->
    <div class="max-w-6xl mx-auto mt-6 px-4">
        <div class="bg-slate-950 border border-amber-500/30 rounded-lg p-4 text-center">
            <span class="text-[10px] uppercase tracking-widest text-amber-500 block mb-1">Sponsored Intelligence Briefing</span>
            <a href="#" id="sponsor-link" class="text-slate-200 hover:text-amber-400 font-medium transition-all">
                🎯 Advertise Security Equipment, UAV Systems, or Affiliate Gear Globally. Contact us to list.
            </a>
        </div>
    </div>

    <!-- Main Content Grid -->
    <main class="max-w-6xl mx-auto p-4 grid grid-cols-1 md:grid-cols-4 gap-6 mt-4">
        
        <!-- Sidebar Navigation / Filter Controls -->
        <aside class="md:col-span-1 space-y-2">
            <h3 class="text-xs uppercase tracking-widest text-slate-500 font-bold px-2 mb-3">Intelligence Channels</h3>
            <button onclick="filterCategory('All')" class="w-full text-left px-3 py-2 rounded text-sm font-medium hover:bg-slate-800 transition-all text-amber-500 bg-slate-800/50" id="btn-All">🌐 All Sectors</button>
            <button onclick="filterCategory('Drones & Autonomous Systems')" class="w-full text-left px-3 py-2 rounded text-sm font-medium hover:bg-slate-800 transition-all text-slate-400" id="btn-Drones">🛸 Drones, UAV & UGV Systems</button>
            <button onclick="filterCategory('Surveillance & AI Analytics')" class="w-full text-left px-3 py-2 rounded text-sm font-medium hover:bg-slate-800 transition-all text-slate-400" id="btn-Surveillance">🎥 CCTV & AI Analytics</button>
            <button onclick="filterCategory('Spy & Covert Equipment')" class="w-full text-left px-3 py-2 rounded text-sm font-medium hover:bg-slate-800 transition-all text-slate-400" id="btn-Spy">🕵️ Spy & Covert Gear</button>
            <button onclick="filterCategory('Physical & Electronic Security')" class="w-full text-left px-3 py-2 rounded text-sm font-medium hover:bg-slate-800 transition-all text-slate-400" id="btn-Physical">🔒 Physical Access Control</button>
            <button onclick="filterCategory('Cybersecurity & Network Defense')" class="w-full text-left px-3 py-2 rounded text-sm font-medium hover:bg-slate-800 transition-all text-slate-400" id="btn-Cyber">💻 Cybersecurity & IoT</button>
        </aside>

        <!-- Dynamic Content Stream -->
        <section class="md:col-span-3 space-y-4" id="radar-stream">
            <div class="text-center py-12 text-slate-500" id="loading-spinner">
                🛰️ Aligning Radar Array... Scanning Database...
            </div>
        </section>

    </main>

    <!-- Hidden Engine Script connecting to Web App Deployment -->
    <script>
        const DATABASE_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxoXeYqSMXP4LDg-NpOhl9ZBS-8TAtJN-VhW8yOHVp9vXMH6YqEb18_1cXzE5CO1E4A/exec";
        let masterData = [];

        async function fetchRadarData() {
            try {
                const response = await fetch(DATABASE_WEBAPP_URL);
                masterData = await response.json();
                renderCards(masterData);
            } catch (error) {
                document.getElementById('loading-spinner').innerText = "⚠️ Network alignment error. Refreshing array shortly.";
            }
        }

        function renderCards(data) {
            const container = document.getElementById('radar-stream');
            container.innerHTML = '';
            
            if(data.length === 0) {
                container.innerHTML = '<div class="text-slate-500 py-8 text-center">No recent alerts in this sector.</div>';
                return;
            }

            data.forEach(item => {
                const card = document.createElement('article');
                card.className = "bg-slate-950 border border-slate-800 hover:border-slate-700 rounded-xl p-5 transition-all shadow-xl space-y-3";
                card.innerHTML = `
                    <div class="flex justify-between items-start gap-2">
                        <span class="text-[11px] font-bold uppercase px-2 py-0.5 rounded bg-slate-800 text-amber-500 tracking-wider">${item.category}</span>
                        <span class="text-xs text-slate-500">${item.date}</span>
                    </div>
                    <h2 class="text-lg font-bold text-white hover:text-amber-400 transition-all"><a href="${item.link}" target="_blank">${item.title}</a></h2>
                    <p class="text-sm text-slate-400 leading-relaxed">${item.summary}</p>
                    <div class="pt-2 flex justify-between items-center">
                        <a href="${item.link}" target="_blank" class="text-xs text-amber-500 hover:underline font-semibold flex items-center gap-1">Read Intelligence Briefing ↗</a>
                        <span class="text-[10px] text-slate-600">Verified System Data</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterCategory(cat) {
            document.querySelectorAll('aside button').forEach(b => b.classList.remove('text-amber-500', 'bg-slate-800/50'));
            event.target.classList.add('text-amber-500', 'bg-slate-800/50');

            if(cat === 'All') {
                renderCards(masterData);
            } else {
                const filtered = masterData.filter(i => i.category.toLowerCase().trim() === cat.toLowerCase().trim());
                renderCards(filtered);
            }
        }

        function subscribeUser() {
            const email = document.getElementById('sub-email').value;
            if(!email) return alert('Please enter a valid intelligence contact vector (email).');
            fetch(DATABASE_WEBAPP_URL + `?action=subscribe&email=${encodeURIComponent(email)}`, { mode: 'no-cors' });
            alert('🚀 Systems Locked! You are securely subscribed to the 24/7 Radar Briefing pipeline.');
            document.getElementById('sub-email').value = '';
        }

        if(DATABASE_WEBAPP_URL !== "YOUR_GOOGLE_WEBAPP_URL_HERE") {
            fetchRadarData();
        }
    </script>
</body>
</html>
